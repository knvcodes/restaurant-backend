version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build: .
    container_name: backend
    tty: true
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - S3_BUCKET_NAME=my-bucket
      - MONGO_URI=mongodb://mongo:27017/myapp # ← service name
      - DB_NAME=myapp
      - MODULE_PATH=src/modules

    depends_on:
      - mongo
      - minio
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - "**/*.test.ts"
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./tsconfig.json

volumes:
  minio_data:
  mongo_data:
